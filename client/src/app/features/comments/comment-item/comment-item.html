<article class="comment-item">
  <header>
    <strong>{{ username }}</strong>
    <span class="date">{{ comment.createdAt | timeAgo }}</span>
  </header>

  <p class="comment-text">{{ comment.text }}</p>

  <div class="comment-actions">
    <button
      (click)="onLike()"
      class="button like"
      [class.active]="isLiked"
      [disabled]="!isLoggedIn || isOwner"
      [title]="isOwner ? 'You cannot like your own comment' : ''"
    >
      <span class="heart">{{ isLiked ? '❤️' : '🤍' }}</span>
      Like {{ likesCount > 0 ? likesCount : '' }}
    </button>

    @if (isOwner) {
      <button (click)="deleteComment()" class="button delete">Delete</button>
    }
  </div>
</article>
